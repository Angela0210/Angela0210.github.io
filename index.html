<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #222;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }

        nav a:hover {
            color: #00adb5;
        }

        .hero {
            padding: 60px 20px;
            text-align: center;
            background: #00adb5;
            color: white;
        }

        .container {
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #111;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>
    <h1>My Website</h1>
    <p>Welcome to my GitHub hosted site 🚀</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h2>Hello 👋</h2>
    <p>This is my first hosted website using GitHub Pages</p>
</section>

<div class="container">
    <div class="card">
        <h3>About Me</h3>
        <p>I’m learning web development and this is my first project.</p>
    </div>

    <div class="card">
        <h3>My Goals</h3>
        <p>Become a full-stack developer and build awesome apps.</p>
    </div>
</div>

<footer>
    <p>© 2026 My Website</p>
</footer>

</body>
</html>
